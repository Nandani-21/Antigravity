<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Workspace Monitor</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <!-- Phosphor Icons for modern minimal icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body>
    <nav class="navbar">
        <div class="logo">
            <i class="ph-fill ph-eye"></i>
            <span>Visionary AI</span>
        </div>
        <div class="nav-controls">
            <button id="theme-toggle" class="icon-btn" title="Toggle Dark/Light Mode">
                <i class="ph ph-sun"></i>
            </button>
            <div class="timer-badge">
                <i class="ph ph-clock"></i>
                <span id="timer-val">0</span>m session
            </div>
        </div>
    </nav>

    <main class="dashboard">
        <!-- LEFT SIDE: Video Feed Section -->
        <section class="video-section">
            <div class="video-container" id="video-container">
                <img src="{{ url_for('video_feed') }}" alt="Live Feed" id="video-stream">
                
                <div class="video-overlay top-left">
                    <div class="status-indicator live">
                        <div class="dot"></div> Live Analysis
                    </div>
                </div>
            </div>
            
            <div class="alerts-container" id="alerts-container">
                <!-- Popup Alerts injected via JS -->
            </div>
        </section>

        <!-- RIGHT SIDE: Dashboard Panel -->
        <aside class="dashboard-panel">
            <h2 class="section-title">System Status</h2>
            
            <!-- A. Status Cards -->
            <div class="status-grid">
                <div class="stat-card" id="card-posture">
                    <div class="stat-icon"><i class="ph ph-person"></i></div>
                    <div class="stat-info">
                        <h3>Posture</h3>
                        <p class="stat-value" id="val-posture">Analyzing...</p>
                    </div>
                </div>

                <div class="stat-card" id="card-eyes">
                    <div class="stat-icon"><i class="ph ph-eye"></i></div>
                    <div class="stat-info">
                        <h3>Eye Status</h3>
                        <p class="stat-value" id="val-eyes">Analyzing...</p>
                    </div>
                </div>

                <div class="stat-card" id="card-distance">
                    <div class="stat-icon"><i class="ph ph-computer-tower"></i></div>
                    <div class="stat-info">
                        <h3>Distance</h3>
                        <p class="stat-value" id="val-distance">Analyzing...</p>
                    </div>
                </div>
            </div>

            <!-- D. Stats Section -->
            <div class="metrics-card">
                <h3>Session Metrics</h3>
                <div class="metric-row">
                    <div class="metric-label">
                        <i class="ph-fill ph-warning-circle text-warning"></i>
                        Posture Warnings
                    </div>
                    <div class="metric-count" id="count-posture">0</div>
                </div>
                <div class="metric-row">
                    <div class="metric-label">
                        <i class="ph-fill ph-eye-closed text-danger"></i>
                        Eye Strain Alerts
                    </div>
                    <div class="metric-count" id="count-eyes">0</div>
                </div>
            </div>

            <!-- Settings / Calibration -->
            <div class="controls-card">
                <h3>Settings</h3>
                <div class="control-row">
                    <span>Voice Alerts & Sounds</span>
                    <label class="switch">
                        <input type="checkbox" id="voice-toggle" checked>
                        <span class="slider round"></span>
                    </label>
                </div>
                <div class="btn-group">
                    <button id="test-voice" class="btn btn-outline">Test Audio</button>
                    <button id="calibrate-btn" class="btn btn-primary">Recalibrate / Reset</button>
                </div>
            </div>
        </aside>
    </main>

    <!-- Alert Audio Source -->
    <audio id="alert-sound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" preload="auto"></audio>

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
