<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visionary AI</title>
    <!-- Bold Modern Font -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body>
    <nav class="navbar">
        <div class="logo">
            <i class="ph-fill ph-target"></i>
            <span>VISIONARY AI</span>
        </div>
        <div class="nav-controls">
            <button id="theme-toggle" class="icon-btn" title="Toggle Mode">
                <i class="ph ph-sun"></i>
            </button>
            <div class="timer-badge">
                <i class="ph ph-clock"></i>
                <span id="timer-val">0</span>M ONLINE
            </div>
        </div>
    </nav>

    <main class="dashboard">
        <!-- LEFT SIDE: Video Feed -->
        <section class="video-section">
            <div class="video-container" id="video-container">
                <img src="{{ url_for('video_feed') }}" alt="Live Feed" id="video-stream">
                
                <div class="video-overlay top-left">
                    <div class="status-indicator live">
                        <div class="dot"></div> LIVE TRACKING
                    </div>
                </div>
            </div>
            
            <div class="alerts-container" id="alerts-container">
                <!-- Popup Alerts injected via JS -->
            </div>
        </section>

        <!-- RIGHT SIDE: Dashboard Panel -->
        <aside class="dashboard-panel">
            <h2 class="section-title">Diagnostics</h2>
            
            <!-- Status Cards -->
            <div class="status-grid">
                <div class="stat-card" id="card-posture">
                    <div class="stat-icon"><i class="ph ph-user-focus"></i></div>
                    <div class="stat-info">
                        <h3>Posture</h3>
                        <p class="stat-value" id="val-posture">SCANNING</p>
                    </div>
                </div>

                <div class="stat-card" id="card-eyes">
                    <div class="stat-icon"><i class="ph ph-eye"></i></div>
                    <div class="stat-info">
                        <h3>Ocular State</h3>
                        <p class="stat-value" id="val-eyes">SCANNING</p>
                    </div>
                </div>

                <div class="stat-card" id="card-distance">
                    <div class="stat-icon"><i class="ph ph-crosshair"></i></div>
                    <div class="stat-info">
                        <h3>Proximity</h3>
                        <p class="stat-value" id="val-distance">SCANNING</p>
                    </div>
                </div>
            </div>

            <!-- Stats Section -->
            <div class="metrics-card">
                <h3>Incident Log</h3>
                <div class="metric-row">
                    <div class="metric-label">
                        <i class="ph-fill ph-warning text-warning"></i>
                        Spine Deviations
                    </div>
                    <div class="metric-count" id="count-posture">0</div>
                </div>
                <div class="metric-row">
                    <div class="metric-label">
                        <i class="ph-fill ph-drop text-danger"></i>
                        Fatigue Alerts
                    </div>
                    <div class="metric-count" id="count-eyes">0</div>
                </div>
            </div>

            <!-- Settings -->
            <div class="controls-card">
                <h3>System Config</h3>
                <div class="control-row">
                    <span>Audio Feedback</span>
                    <label class="switch">
                        <input type="checkbox" id="voice-toggle" checked>
                        <span class="slider round"></span>
                    </label>
                </div>
                <div class="btn-group">
                    <button id="test-voice" class="btn btn-outline">TEST AUDIO</button>
                    <button id="calibrate-btn" class="btn btn-primary">RECALIBRATE</button>
                </div>
            </div>
        </aside>
    </main>

    <!-- Alert Audio Source -->
    <audio id="alert-sound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" preload="auto"></audio>

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
